name: Plaid Monthly Cashflow
version: "0.1.8"
slug: plaid_monthly_cashflow
description: Local monthly inflow and outflow dashboard backed by Plaid transactions.
url: https://github.com/resace3/home-assistant-plaid-monthly-cashflow
arch:
  - aarch64
  - amd64
startup: services
boot: manual
init: false
ingress: true
ingress_port: 8099
ingress_entry: /v018/
panel_icon: mdi:bank
panel_title: Plaid Cashflow
options:
  plaid_client_id: ""
  plaid_secret: ""
  plaid_env: sandbox
  plaid_redirect_uri: ""
  plaid_products:
    - transactions
  plaid_country_codes:
    - US
  sync_months_back: 12
  sync_interval_minutes: 360
  local_db_path: /data/plaid_cashflow.sqlite
  currency: USD
  debug_logging: false
schema:
  plaid_client_id: str
  plaid_secret: password
  plaid_env: list(sandbox|production)
  plaid_redirect_uri: str
  plaid_products:
    - list(transactions)
  plaid_country_codes:
    - list(US|CA)
  sync_months_back: int
  sync_interval_minutes: int
  local_db_path: str
  currency: str
  debug_logging: bool
